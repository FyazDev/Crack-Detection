name: Deploy Application

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-to-space:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Initialize Git LFS
          git lfs install
          
          # Track binary files
          git lfs track "*.pt"
          git lfs track "*.png"
          
          # Create an orphan branch to clean up history and convert binaries to LFS pointers
          git checkout --orphan deploy-branch
          git rm --cached -r .
          git add .gitattributes
          git add .
          git commit -m "Deploy to Hugging Face Spaces"
          
          # Add remote and force push to HF space
          git remote add space https://FyazNafin:$HF_TOKEN@huggingface.co/spaces/FyazNafin/crack-detection
          git push --force space deploy-branch:main

  deploy-to-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Frontend to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend
          branch: gh-pages
